appId: com.multimind.browser
productName: MultiMind Flow
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: build/icon.ico
    to: icon.ico
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.productivity
  identity: null

dmg:
  iconSize: 128
  iconTextSize: 14
  window:
    width: 720
    height: 440
  contents:
    - x: 200
      y: 250
      type: file
    - x: 520
      y: 250
      type: link
      path: /Applications

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
