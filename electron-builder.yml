appId: com.multimind.browser
productName: MultiMind Browser
directories:
  output: release
files:
  - dist/**
  - package.json

mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.productivity
  identity: null

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
